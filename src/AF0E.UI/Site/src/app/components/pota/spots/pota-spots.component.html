<div class="top-spacer"></div>
<p-table
  [value]="spots()"
  dataKey="callSign"
  sortField="lastSpotTime"
  [sortOrder]="-1"
  [scrollable]="true"
  scrollHeight="calc(100vh - 9.6rem)"
  class="tbl-activity"
  stripedRows>

  <ng-template pTemplate="header">
    <tr>
      <th>Time</th>
      <th>Call</th>
      <th>Park</th>
      <th>Band</th>
      <th>Freq</th>
      <th>Mode</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-act>
    <tr>
      <td>{{ act.lastSpotTime | timeAgo }}</td>
      <td>{{ act.callSign }}</td>
      <td>{{ act.parkNum }}</td>
      <td>{{ act.band }}</td>
      <td>{{ act.freqKhz }}</td>
      <td><p-tag [value]="act.mode|qsoMode" [severity]="act.mode|modeSeverity" /></td>
    </tr>
  </ng-template>
</p-table>

<p-scrollTop />
